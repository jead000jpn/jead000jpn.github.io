<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剪刀的AA整合站/まとめ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #0f3460;
            margin-bottom: 20px;
            background: #0f3460;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
            font-size: 60px;
        }

        h1 {
            color: #e94560;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tagline {
            color: #a0a0a0;
            font-size: 1.2em;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            color: #e94560;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0f3460;
        }

        p {
            color: #d0d0d0;
            margin-bottom: 15px;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-tag {
            background: #0f3460;
            color: #e94560;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .links a {
            color: #e94560;
            text-decoration: none;
            padding: 12px 24px;
            border: 2px solid #e94560;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .links a:hover {
            background: #e94560;
            color: #1a1a2e;
        }

        .project {
            background: rgba(15, 52, 96, 0.5);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .project h3 {
            color: #e94560;
            margin-bottom: 10px;
        }

        .project p {
            margin-bottom: 0;
            font-size: 0.95em;
        }

        footer {
            text-align: center;
            color: #666;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="avatar">🔐</div>
            <h1>剪刀的AA整合站/まとめ</h1>
            <div class="links">
                <a href="https://github.com/jead000jpn" target="_blank">GitHub</a>
            </div>
        </header>

        <section class="section">
            <h2>現有翻譯</h2>
            <p>
                Testing
            </p>
        </section>

        <section class="section">
            <h2>Projects</h2>
            <div class="project">
                <h3>🔍 Security Scanner</h3>
                <p>一個自動化的網站安全掃描工具，整合了多種檢測模組。</p>
            </div>
            <div class="project">
                <h3>📝 Vulnerability Writeups</h3>
                <p>記錄我在 CTF 比賽和實際滲透測試中發現的漏洞分析。</p>
            </div>
            <div class="project">
                <h3>🛠️ Pentest Toolkit</h3>
                <p>自己開發的滲透測試輔助腳本集合。</p>
            </div>
        </section>
        <footer>
            <p>© 2026 Jead000. Built with ❤️ and hosted on GitHub Pages.</p>
        </footer>
    </div>
</body>
</html>
